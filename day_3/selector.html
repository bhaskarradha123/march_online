<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors in CSS</title>
    <link rel="stylesheet" href="selector.css">
</head>
<body>
    
    <div>Lorem ipsum dolor sit amet consectetur adipisicing elit. Necessitatibus, vitae.</div>
    <div class="div2">this is another statement</div>
    <div class="div2">Lorem ipsum dolor sit amet.</div>
    <div id="div4" class="div2">this is css session</div>
    <p class="div2">Lorem ipsum dolor sit amet consectetur.</p>
    <b>bold tag</b>
    <i>italic tag</i>
    <del>delete tag</del>
    <mark id="mark">mark tag</mark>
    <span class="span"></span>
</body>
</html>
<!-- selectors: are used to select the element to style -->
