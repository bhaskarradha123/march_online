<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to Js</title>
</head>
<body>

    <script>
        function doubleClick(){
            alert('hlo students through double click' )
        }
    </script>
    
    <!-- inline js -->
    <button onclick="alert('hlo students' )">Click</button>
   <br><br>

     <!-- internal JS -->
    <button ondblclick="doubleClick()" >Double click On Me</button>

    <br><br>

    <!-- external JS -->
    <i onclick="f1()">Click On ME</i>
    <script src="./intro.js"></script>



</body>
</html>
